name: 'Runhuman QA Test'
description: 'Run human QA tests on URLs, PRs, and issues with real testers'
author: 'Runhuman'
branding:
  icon: 'check-square'
  color: 'green'

inputs:
  # Required - where to test
  url:
    description: 'URL to test (must be publicly accessible)'
    required: true

  # Test context sources (all additive, deduped)
  description:
    description: 'Additional test instructions for the tester'
    required: false
  pr-numbers:
    description: 'PR numbers to find linked issues from (JSON array or comma-separated)'
    required: false
  issue-numbers:
    description: 'Issue numbers to test directly (JSON array or comma-separated)'
    required: false

  # Success callbacks
  on-success-add-labels:
    description: 'Labels to add on test success (JSON array)'
    required: false
  on-success-remove-labels:
    description: 'Labels to remove on test success (JSON array)'
    required: false

  # Failure callbacks
  on-failure-add-labels:
    description: 'Labels to add on test failure (JSON array)'
    required: false
  on-failure-remove-labels:
    description: 'Labels to remove on test failure (JSON array)'
    required: false

  # Not-testable callbacks
  on-not-testable-add-labels:
    description: 'Labels to add when issue is not testable (JSON array)'
    required: false
  on-not-testable-remove-labels:
    description: 'Labels to remove when issue is not testable (JSON array)'
    required: false

  # Timeout callbacks
  on-timeout-add-labels:
    description: 'Labels to add on test timeout (JSON array)'
    required: false
  on-timeout-remove-labels:
    description: 'Labels to remove on test timeout (JSON array)'
    required: false

  # Workflow control
  fail-on-error:
    description: 'Fail the workflow on system errors'
    required: false
    default: 'true'
  fail-on-failure:
    description: 'Fail the workflow if any test fails. Requires a boolean "success" field in the output schema — without one, completed tests always count as passed.'
    required: false
    default: 'true'
  fail-on-timeout:
    description: 'Fail the workflow if tester times out'
    required: false
    default: 'false'
  wait-for-result:
    description: 'Wait for test completion before finishing. Set to false for fire-and-forget mode (creates jobs and exits immediately).'
    required: false
    default: 'true'

  post-pr-comment:
    description: 'When true, post (or update) a sticky PR comment containing the tester narrative, AI-extracted bug list, and a link to the full session. Requires pr-numbers, wait-for-result=true, and a github-token with pull-requests:write.'
    required: false
    default: 'false'

  # API configuration
  api-key:
    description: 'Runhuman API key or PAT (rh_..., rh_pat_...)'
    required: true
  github-token:
    description: 'GitHub token for API access'
    required: false
    default: ${{ github.token }}

  # Template configuration
  template:
    description: 'Template name to use (resolved from .runhuman/templates/, project, or builtins)'
    required: false
  template-file:
    description: 'Path to local template file (e.g., .runhuman/templates/smoke.md)'
    required: false

  # Test configuration
  target-duration-minutes:
    description: 'Target test duration in minutes (1-60)'
    required: false
    default: '5'
  device-class:
    description: 'Device class: desktop or mobile'
    required: false
    default: 'desktop'
  output-schema:
    description: 'JSON schema for extracting structured data from test results (used with description-only tests)'
    required: false
  auto-create-github-issues:
    description: 'When set, enables (true) or disables (false) server-side auto-creation of GitHub issues from extracted QA findings using the detailed renderer (Expected / Actual / Where / Evidence / Related Telemetry). When unset, the project/template default applies.'
    required: false
  auto-create-github-issues-repo:
    description: 'Target repo (owner/repo) for auto-created GitHub issues. Only takes effect when auto-creation is enabled via this input or the project/template. Must be one of the project''s linked repos.'
    required: false
  requires-runhuman-apk-install:
    description: 'INTERNAL (@volter.ai callers only): request the Runhuman dual-device self-test flow, routing to testers with the APK-install capability. Non-Volter callers are rejected with 403. Distinct from generic third-party APK-install jobs.'
    required: false
    default: 'false'
outputs:
  status:
    description: 'Test status (completed, error, timeout, no-issues, created)'
  success:
    description: 'Whether all tests passed (true/false)'
  tested-issues:
    description: 'JSON array of tested issue numbers'
  passed-issues:
    description: 'JSON array of passed issue numbers'
  failed-issues:
    description: 'JSON array of failed issue numbers'
  not-testable-issues:
    description: 'JSON array of not-testable issue numbers'
  timed-out-issues:
    description: 'JSON array of timed-out issue numbers'
  results:
    description: 'Full JSON results object'
  cost-usd:
    description: 'Total cost in USD'
  duration-seconds:
    description: 'Total duration in seconds'
  job-ids:
    description: 'JSON array of job IDs'
  job-urls:
    description: 'JSON array of job URLs'
  extracted-issues:
    description: 'JSON array of AI-extracted issues from test results, enriched with related issue detection'

runs:
  using: 'node20'
  main: 'dist/index.js'
